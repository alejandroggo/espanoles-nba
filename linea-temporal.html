<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('ag-theme')||'auto';var d=t==='dark'||(t==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea temporal · Españoles en la NBA</title>
<meta name="description" content="Línea temporal de todos los españoles en la NBA: en qué equipo estuvo cada uno, temporada a temporada, desde Fernando Martín.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">ESPAÑOLES <span>EN LA</span> NBA</a>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema" onclick="cycleTheme()"></button>
    </div>
  </div>
</header>

<!-- CONTENIDO -->
<main>
  <section class="hero hero--page">
    <div class="hero-top">
      <div>
        <h1 class="hero-title ag-hero">La <em>Línea temporal</em></h1>
        <p class="hero-sub" id="hero-sub">Cargando datos…</p>
      </div>
    </div>
  </section>

  <section class="controles" aria-label="Orden y filtros">
    <div class="mode-switch" role="group" aria-label="Ordenar por">
      <button type="button" id="tl-sort-debut" class="toggle-chip active" aria-pressed="true" onclick="setTlSort('debut')">Por debut</button>
      <button type="button" id="tl-sort-seas" class="toggle-chip" aria-pressed="false" onclick="setTlSort('seas')">Por temporadas</button>
      <button type="button" id="tl-sort-alpha" class="toggle-chip" aria-pressed="false" onclick="setTlSort('alpha')">Alfabético</button>
    </div>
    <label class="sel-wrap tl-range">
      <span class="tl-range-lbl">Desde</span>
      <select id="tl-from" class="sel" aria-label="Año de inicio"></select>
    </label>
    <label class="sel-wrap tl-range">
      <span class="tl-range-lbl">Hasta</span>
      <select id="tl-to" class="sel" aria-label="Año final"></select>
    </label>
  </section>

  <section class="tl-wrap" aria-label="Línea temporal de trayectorias">
    <table id="tl-table">
      <thead id="tl-thead"></thead>
      <tbody id="tl-body"></tbody>
      <tfoot id="tl-tfoot"></tfoot>
    </table>
  </section>
</main>

<!-- FOOTER -->
<footer class="ag-footer">
  <div class="ag-footer-brand">
