<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Españoles en la NBA</title>
<meta name="description" content="Base de datos completa de todos los jugadores españoles en la NBA. Estadísticas, temporadas, playoffs, premios y récords históricos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-title">ESPAÑOLES <span>EN LA</span> NBA</div>
  <div class="loader-bar"></div>
</div>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo" onclick="goHome()">ESPAÑOLES <span>EN LA</span> NBA</div>
    <div class="header-right">
      <button class="nav-btn" onclick="showTransacciones()">Transacciones</button>
      <span class="last-update" id="last-update"></span>
    </div>
  </div>
</header>

<!-- VISTA RANKING -->
<div id="view-ranking" class="view active">
  <div class="hero">
    <div class="hero-top">
      <div>
        <h1 class="hero-title">TODOS LOS<br><em>Españoles</em><br>EN LA NBA</h1>
        <p class="hero-sub" id="hero-sub">Cargando datos…</p>
      </div>
      <div class="hero-kpis" id="hero-kpis"></div>
    </div>
  </div>

  <div class="controles">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar jugador…" oninput="filterTabla()">
    </div>
    <div class="mode-chips">
      <button class="mode-chip active" data-mode="per_game"        onclick="setViewMode('per_game')">Por partido</button>
      <button class="mode-chip"        data-mode="season_highs"    onclick="setViewMode('season_highs')">Mejor temp.</button>
      <button class="mode-chip"        data-mode="totals"          onclick="setViewMode('totals')">Totales</button>
      <span class="mode-chips-sep"></span>
      <button class="mode-chip"        data-mode="playoffs_pg"     onclick="setViewMode('playoffs_pg')">PO PG</button>
      <button class="mode-chip"        data-mode="playoffs_sh"     onclick="setViewMode('playoffs_sh')">PO Mejor</button>
      <button class="mode-chip"        data-mode="playoffs_totals" onclick="setViewMode('playoffs_totals')">PO Tot.</button>
    </div>
    <div class="controles-sep"></div>
    <div id="sort-chips" class="sort-chips"></div>
    <span class="results-count" id="results-count"></span>
  </div>

  <div class="tabla-wrap">
    <table id="ranking-table">
      <thead id="ranking-thead"></thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>
</div>

<!-- VISTA TRANSACCIONES -->
<div id="view-transacciones" class="view">
  <div class="trans-header">
    <button class="back-btn" onclick="goHome()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Volver al ranking
    </button>
    <h2 class="trans-title">Todas las transacciones</h2>
  </div>
  <div class="tabla-wrap">
    <table id="trans-table">
      <thead>
        <tr>
          <th>Fecha</th><th>Jugador</th><th>Tipo</th><th>De</th><th>A</th><th>Detalle</th>
        </tr>
      </thead>
      <tbody id="trans-body"></tbody>
    </table>
  </div>
</div>

<!-- VISTA JUGADOR -->
<div id="view-jugador" class="view">
  <button class="back-btn" onclick="goHome()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    Volver al ranking
  </button>
  <div id="ficha-content"></div>
</div>

<script src="app.js"></script>
<script>init();</script>
</body>
</html>
