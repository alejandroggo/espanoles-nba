<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('ag-theme')||'auto';var d=t==='dark'||(t==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft · Españoles en la NBA</title>
<meta name="description" content="Todos los jugadores españoles elegidos en el Draft de la NBA: año, pick, equipo y procedencia. Desde Fernando Martín (1985) hasta hoy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/espanoles-nba/favicon.svg">
<link rel="icon" type="image/x-icon" href="/espanoles-nba/favicon.ico">
<link rel="apple-touch-icon" href="/espanoles-nba/apple-touch-icon.png">
<link rel="stylesheet" href="style.css?v=31">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">ESPAÑOLES <span>EN LA</span> NBA</a>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema" onclick="cycleTheme()"></button>
    </div>
  </div>
</header>

<!-- CONTENIDO -->
<main>
  <section class="hero hero--page">
    <div class="hero-top">
      <div>
        <h1 class="hero-title ag-hero">EL <em>Draft</em></h1>
        <p class="hero-sub" id="hero-sub">Cargando datos…</p>
      </div>
      <div class="hero-kpis" id="draft-kpis"></div>
    </div>
  </section>

  <section class="controles" aria-label="Filtros">
    <div class="search-wrap">
      <input type="text" id="draft-search" placeholder="Buscar jugador…" aria-label="Buscar jugador">
    </div>
    <label class="sel-wrap">
      <span class="sr-only">Filtrar por franquicia</span>
      <select id="draft-team" class="sel"></select>
    </label>
    <label class="sel-wrap">
      <span class="sr-only">Filtrar por ronda</span>
      <select id="draft-round" class="sel">
        <option value="">Todas las rondas</option>
        <option value="lottery">Lotería (1-14)</option>
        <option value="first">1ª ronda (1-30)</option>
        <option value="second">2ª ronda (31+)</option>
      </select>
    </label>
    <span class="results-count" id="draft-count"></span>
  </section>

  <section class="tabla-wrap" aria-label="Jugadores drafteados">
    <table id="draft-table">
      <thead id="draft-thead"></thead>
      <tbody id="draft-body"></tbody>
    </table>
  </section>

  <section class="undrafted-wrap" aria-label="Jugadores no drafteados">
    <h2 class="section-title">Undrafted</h2>
    <p class="section-sub">Llegaron a la NBA sin pasar por el draft.</p>
    <div class="undrafted-grid" id="undrafted-grid"></div>
  </section>
</main>

<!-- FOOTER -->
<footer class="ag-footer">
  <div class="ag-footer-brand">
    <strong>Alejandro Gaitán</strong>
    <span>Periodismo NBA en español</span>
  </div>
  <nav class="ag-footer-projects" aria-label="Otros proyectos">
    <a href="https://alejandroggo.github.io/portfolio/" rel="noopener noreferrer">Portfolio</a>
    <a href="https://alejandroggo.github.io/nba-rankings/" rel="noopener noreferrer">Rankings NBA</a>
    <a href="https://alejandroggo.github.io/nba-offseason-2026/" rel="noopener noreferrer">Off-Season 2026</a>
    <a href="https://alejandroggo.github.io/NBA-espanol/" rel="noopener noreferrer">NBA en Español</a>
  </nav>
  <nav class="ag-footer-pubs" aria-label="Publicaciones">
    <a href="https://alejandroggo.substack.com" rel="noopener noreferrer">Substack</a>
    <a href="https://www.gigantes.com/author/alejandrogaitan/" rel="noopener noreferrer">Gigantes</a>
    <a href="https://alejandrogaitan.com" rel="noopener noreferrer">alejandrogaitan.com</a>
  </nav>
  <div class="ag-footer-meta">
    <span>© Alejandro Gaitán</span>
    <span>Última actualización: <time id="ag-last-update" datetime=""></time></span>
  </div>
</footer>

<script src="app.js?v=31"></script>
<script>initTheme(); initDraftPage();</script>
</body>
</html>
