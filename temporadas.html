<script>(function(){try{var t=localStorage.getItem('ag-theme')||'auto';var d=t==='dark'||(t==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporadas · Españoles en la NBA</title>
<meta name="description" content="Desglose temporada a temporada de cada español en la NBA, en totales y por partido. Los años con traspaso se unen bajo la fila TOT.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.basketball-reference.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=39">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">ESPAÑOLES <span>EN LA</span> NBA</a>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema" onclick="cycleTheme()"></button>
    </div>
  </div>
</header>

<!-- CONTENIDO -->
<main>
  <section class="hero hero--page">
    <div class="hero-top">
      <div>
        <h1 class="hero-title ag-hero">Las <em>Temporadas</em></h1>
        <p class="hero-sub" id="hero-sub">Cargando datos…</p>
      </div>
    </div>
  </section>

  <section class="controles" aria-label="Jugador y vista">
    <label class="sel-wrap">
      <span class="sr-only">Jugador</span>
      <select id="tmp-player" class="sel"></select>
    </label>
    <div class="mode-switch" role="group" aria-label="Totales o por partido">
      <button type="button" id="tmp-mode-total" class="toggle-chip active" aria-pressed="true" onclick="setTmpMode('total')">Totales</button>
      <button type="button" id="tmp-mode-pg" class="toggle-chip" aria-pressed="false" onclick="setTmpMode('pg')">Por partido</button>
    </div>
  </section>

  <section class="cmp-wrap" aria-label="Temporada a temporada">
    <div id="tmp-out"></div>
  </section>
</main>

<!-- FOOTER -->
<footer class="ag-footer">
  <div class="ag-footer-brand">
    <strong>Alejandro Gaitán</strong>
