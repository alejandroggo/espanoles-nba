<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">ESPAÑOLES <span>EN LA</span> NBA</a>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema" onclick="cycleTheme()"></button>
    </div>
  </div>
</header>

<!-- CONTENIDO -->
<main>
  <section class="hero hero--page">
    <div class="hero-top">
      <div>
        <h1 class="hero-title ag-hero">Las <em>Temporadas</em></h1>
        <p class="hero-sub" id="hero-sub">Cargando datos…</p>
      </div>
    </div>
  </section>

  <section class="controles" aria-label="Filtros">
    <div class="search-wrap">
      <input type="text" id="tmp-search" placeholder="Buscar jugador…" aria-label="Buscar jugador">
    </div>
    <label class="sel-wrap">
      <span class="sr-only">Filtrar por equipo</span>
      <select id="tmp-team" class="sel"></select>
    </label>
    <label class="sel-wrap">
      <span class="sr-only">Filtrar por temporada</span>
      <select id="tmp-year" class="sel"></select>
    </label>
    <div class="mode-switch" role="group" aria-label="Temporada regular o playoffs">
      <button type="button" id="tmp-dim-reg" class="toggle-chip active" aria-pressed="true" onclick="setTmpDim('reg')">Temporada regular</button>
      <button type="button" id="tmp-dim-po" class="toggle-chip" aria-pressed="false" onclick="setTmpDim('po')">Playoffs</button>
    </div>
    <div class="mode-switch" role="group" aria-label="Totales o por partido">
      <button type="button" id="tmp-mode-total" class="toggle-chip active" aria-pressed="true" onclick="setTmpMode('total')">Totales</button>
      <button type="button" id="tmp-mode-pg" class="toggle-chip" aria-pressed="false" onclick="setTmpMode('pg')">Por partido</button>
    </div>
    <button type="button" id="tmp-hide" class="toggle-chip" aria-pressed="false" onclick="toggleTmpPartials()">Ocultar parciales</button>
    <span class="results-count" id="tmp-count"></span>
  </section>

  <div class="tmp-legend" aria-label="Leyenda">
    <span class="tmp-lg"><span class="tmp-sw tmp-sw-parcial"></span> Traspasado</span>
    <span class="tmp-lg"><span class="tmp-sw tmp-sw-cut"></span> Cortado</span>
  </div>

  <section class="tabla-wrap" aria-label="Todas las temporadas">
    <table id="tmp-table">
      <thead id="tmp-thead"></thead>
      <tbody id="tmp-tbody"></tbody>
    </table>
  </section>
</main>
